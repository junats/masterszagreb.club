name: deployer
run-name: Deployer ${{ inputs.event }}

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: registry.nivas.hr
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout
        uses: actions/checkout@v6
        # with:
          # submodules: true
          # ssh-key: ${{ secrets.SSH_KEY_CI }}
          # ssh-strict: true
          # ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: registry.nivas.hr/markupmark/masterszagreb

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /srv/masterszagreb.club/
            docker compose pull
            docker compose up -d
