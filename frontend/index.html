<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>TrueTrack</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontSize: {
            'xxxs': '9px',
            'xxs': '10px',
          },
          colors: {
            background: '#020617', // Slate 950 (Deeper black/blue)
            surface: '#0f172a',    // Slate 900 (Card bg)
            surfaceHighlight: '#1e293b', // Slate 800 (Hover/Active)
            primary: '#38bdf8',    // Sky 400
            secondary: '#818cf8',  // Indigo 400
            accent: '#34d399',     // Emerald 400
            luxury: '#f472b6',     // Pink 400
            necessity: '#60a5fa',  // Blue 400
            food: '#fbbf24',       // Amber 400
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', 'sans-serif'],
            heading: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: 224 71.4% 4.1%;
      background-color: hsl(var(--background));
      /* Ensure html has bg color */
      --foreground: 210 40% 98%;
      --card: 224 71.4% 6.1%;
      --card-foreground: 210 40% 98%;
      --popover: 224 71.4% 4.1%;
      --popover-foreground: 210 40% 98%;
      --primary: 217 91% 60%;
      --primary-foreground: 222.2 47.4% 11.2%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --accent: 217.2 32.6% 17.5%;
      --accent-foreground: 210 40% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 210 40% 98%;
      --border: 217.2 32.6% 17.5%;
      --input: 217.2 32.6% 17.5%;
      --ring: 212.7 26.8% 83.9%;
      --radius: 0.75rem;
    }

    /* PREMIUM TYPE POLISH */
    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      /* Bolder base weight */
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      overflow: hidden;
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .glow-text {
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }

    .shadow-glow {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
    }

    #root {
      height: 100vh;
      width: 100vw;
    }
  </style>
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Global Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes glow-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    @keyframes fillPulse {

      0%,
      100% {
        fill: rgba(56, 189, 248, 0.1);
      }

      50% {
        fill: rgba(56, 189, 248, 0.6);
      }
    }

    .animate-glow-pulse {
      animation: glow-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }


    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .animate-slide-up {
      animation: slideUp 0.4s ease-out forwards;
    }

    .animate-scale-in {
      animation: scaleIn 0.3s ease-out forwards;
    }

    /* Smooth transitions for data updates */
    .transition-width {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .transition-all-data {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dashboard Specific Animations */
    @keyframes pulse-border-v2 {
      0% {
        box-shadow: 0 0 5px -2px var(--glow-color);
        border-color: var(--glow-color);
      }

      50% {
        box-shadow: 0 0 var(--glow-size) 0px var(--glow-color);
        border-color: var(--glow-color-bright);
      }

      100% {
        box-shadow: 0 0 5px -2px var(--glow-color);
        border-color: var(--glow-color);
      }
    }

    .recharts-wrapper {
      outline: none !important;
    }

    .recharts-surface {
      outline: none !important;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "heic2any": "https://esm.sh/heic2any@0.0.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
</head>

<body
  class="bg-background text-slate-100 antialiased overflow-hidden selection:bg-primary selection:text-white font-sans">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
