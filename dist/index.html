<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MASTERS - Premium nightclub experience">
    <title>MASTERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile-menu.css">
    <link rel="stylesheet" href="events-toggle.css">
    <link rel="stylesheet" href="logo-glitch.css">
</head>

<body>
    <!-- Film grain overlay -->
    <div class="grain-overlay"></div>

    <!-- Stickman Movie Scene (Top Right) - Click for Events -->
    <button id="eventsToggleBtn" class="stickman-scene" aria-label="Toggle Events">
        <div class="scene-stage">
            <!-- Guy: chilling, smoking -->
            <div class="stick-guy">
                <div class="guy-smoke">💨</div>
                <svg viewBox="0 0 80 100" width="40" height="50">
                    <circle class="guy-head" cx="40" cy="15" r="8" fill="none" stroke="currentColor" stroke-width="4" />
                    <line class="guy-body" x1="40" y1="23" x2="40" y2="55" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="guy-arm-l" x1="40" y1="35" x2="18" y2="45" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="guy-arm-r" x1="40" y1="35" x2="62" y2="30" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="guy-leg-l" x1="40" y1="55" x2="25" y2="85" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="guy-leg-r" x1="40" y1="55" x2="55" y2="85" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                </svg>
            </div>
            <!-- Girl: walks in from right -->
            <div class="stick-girl">
                <svg viewBox="0 0 80 100" width="35" height="45">
                    <circle class="girl-head" cx="40" cy="15" r="8" fill="none" stroke="currentColor"
                        stroke-width="4" />
                    <path class="girl-hair" d="M32 12 Q30 3 40 1 Q50 3 48 12" fill="none" stroke="currentColor"
                        stroke-width="3" />
                    <line class="girl-body" x1="40" y1="23" x2="40" y2="50" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <path class="girl-skirt" d="M28 50 L40 44 L52 50" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" />
                    <line class="girl-arm-l" x1="40" y1="32" x2="22" y2="42" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="girl-arm-r" x1="40" y1="32" x2="58" y2="38" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="girl-leg-l" x1="35" y1="50" x2="28" y2="80" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                    <line class="girl-leg-r" x1="45" y1="50" x2="52" y2="80" stroke="currentColor" stroke-width="4"
                        stroke-linecap="round" />
                </svg>
            </div>
        </div>
        <!-- Chat bubbles appear during conversation -->
        <div class="chat-bubbles" id="chatBubbles"></div>
        <!-- Close X (shown when active) -->
        <div class="close-x">
            <span></span>
            <span></span>
        </div>
    </button>

    <!-- Centered SVG Logo -->
    <img id="svgLogo" src="master-logo.svg" alt="MASTERS Logo">

    <!-- Hidden Pong Canvas -->
    <canvas id="audioLogoCanvas" style="display: none;"></canvas>

    <!-- Matrix Message Container -->
    <div class="matrix-container" id="matrixContainer">
        <div class="matrix-canvas" id="matrixCanvas"></div>
        <div class="event-messages" id="eventMessages"></div>
    </div>

    <!-- Background Effects -->
    <div class="bg-gradient"></div>
    <div class="scanlines"></div>

    <!-- Three.js for Pong game -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="audio-logo.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
