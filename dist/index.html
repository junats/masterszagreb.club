<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MASTERS - Premium nightclub experience">
    <title>MASTERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile-menu.css">
    <link rel="stylesheet" href="morph-menu.css">
    <link rel="stylesheet" href="logo-glitch.css">
</head>

<body>
    <!-- Film grain overlay -->
    <div class="grain-overlay"></div>

    <!-- Geometric Morph Menu Trigger -->
    <button id="morphToggleBtn" class="morph-menu-btn" aria-label="Toggle Events">
        <div class="morph-grid">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>
    </button>

    <!-- Centered SVG Logo -->
    <img id="svgLogo" src="master-logo.svg" alt="MASTERS Logo">

    <!-- Hidden Pong Canvas -->
    <canvas id="audioLogoCanvas" style="display: none;"></canvas>

    <!-- Matrix Message Container -->
    <div class="matrix-container" id="matrixContainer">
        <div class="matrix-canvas" id="matrixCanvas"></div>
        <div class="event-messages" id="eventMessages"></div>
    </div>

    <!-- Background Effects -->
    <div class="bg-gradient"></div>
    <div class="scanlines"></div>

    <!-- Three.js for Pong game -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="audio-logo.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
